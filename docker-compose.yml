services:

  postgres:
    image: postgres:17
    container_name: maje-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: maje
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: hardynatta-backend
    restart: unless-stopped

    env_file:
      - ./backend/.env

    depends_on:
      - postgres

    ports:
      - "8000:8000"

volumes:
  postgres_data: